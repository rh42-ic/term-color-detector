name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: term-color-det-linux-x86_64-gnu
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            name: term-color-det-linux-x86_64-musl
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            name: term-color-det-linux-aarch64-musl
          - os: macos-latest
            target: x86_64-apple-darwin
            name: term-color-det-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            name: term-color-det-macos-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: term-color-det-windows-x86_64.exe
            extension: .exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross for aarch64
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: cargo install cross

      - name: Build binary (native)
        if: matrix.target != 'aarch64-unknown-linux-musl'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build binary (cross)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: cross build --release --target ${{ matrix.target }}

      - name: Prepare artifact
        shell: bash
        run: |
          mkdir dist
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp target/${{ matrix.target }}/release/term-color-det.exe dist/${{ matrix.name }}
          else
            cp target/${{ matrix.target }}/release/term-color-det dist/${{ matrix.name }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/${{ matrix.name }}

  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          generate_release_notes: true
